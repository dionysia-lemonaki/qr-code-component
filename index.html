<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Code Component</title>
    <link rel="stylesheet" href="/style.css" />
    <meta name="author" content="Dionysia Lemonaki" />
    <meta
      name="description"
      content="Solution to Frontend Mentor's QR Code Component Challenge"
    />
    <link
      rel="icon"
      type="image/png"
      href="/assets/images/favicon-96x96.png"
      sizes="96x96"
    />
  </head>
  <body>
    <main>
      <h1 class="sr-only">QR Code Component</h1>
      <article class="card flex-column" aria-labelledby="qr-code">
        <img
          src="/assets/images/image-qr-code.png"
          alt="QR code to frontendmentor.io"
          width="288"
          height="288"
          class="card__image"
        />
        <div class="card__content flex-column">
          <h2 id="qr-code" class="card__title">
            Improve your front-end skills by building projects
          </h2>
          <p class="card__description">
            Scan the QR code to visit Frontend Mentor and take your coding
            skills to the next level
          </p>
        </div>
      </article>
    </main>
  </body>
</html>
